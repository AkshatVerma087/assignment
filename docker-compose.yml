services:
  mongo:
    image: mongo:7
    container_name: assignment-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    container_name: assignment-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/assignment_db
      JWT_SECRET: change_this_secret_in_production
      FRONTEND_URL: http://localhost:5173
      NODE_ENV: production
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:3000/api/v1
    container_name: assignment-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  mongo_data:
